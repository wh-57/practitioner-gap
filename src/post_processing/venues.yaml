  rfs: review of financial studies
  jfqa: journal of financial and quantitative analysis
  rof: review of finance
  jcf: journal of corporate finance
  raps: review of asset pricing studies
  rcfs: review of corporate finance studies
  jbf: journal of banking and finance
  jfm: journal of financial markets
  jme: journal of monetary economics
  jmcb: journal of money credit and banking
  aer: american economic review
  qje: quarterly journal of economics
  jpe: journal of political economy
  restud: review of economic studies
  ms: management science
  jar: journal of accounting research
  jae: journal of accounting and economics
  tar: accounting review
  rast: review of accounting studies
  jep: journal of economic perspectives

  # Practitioner
  faj: financial analysts journal
  jpm: journal of portfolio management
  jim: journal of investment management
  jai: journal of alternative investments
  jii: journal of index investing
  jsf: journal of structured finance
