# ─────────────────────────────────────────────────────────────────────── #
# Ambiguous — exact normalized string here returns None (unknown)
# Defer to LLM and (post-join) OpenAlex.
# ─────────────────────────────────────────────────────────────────────── #
ambiguous:
  - jfi                          # Journal of Financial Intermediation (academic)
                                 # vs Journal of Fixed Income (practitioner)
  - jof                          # could be Journal of Finance, Journal of Futures,
                                 # Journal of Forecasting
  - jbfa                         # Journal of Business Finance & Accounting — mixed

  # Publishers — not journals. Could be academic books or practitioner trade.
  - oxford university press
  - princeton university press
  - cambridge university press
  - university of chicago press
  - harvard business review press
  - wiley
  - john wiley and sons
  - mcgraw hill
  - elsevier
  - palgrave macmillan
  - springer

  # Data/stats institutes — depends what's being cited (dataset vs report)
  - insee                        # French national statistics institute
  - bureau of labor statistics
  - federal reserve bank         # different from working paper series below
  - real estate finance          # generic name — could be academic journal,
                                 # textbook, or firm commentary

# ─────────────────────────────────────────────────────────────────────── #
# Working-paper substrings — match anywhere in normalized venue string
# Return None so the Phase 1.5 author-network check (pending) can classify.
# ─────────────────────────────────────────────────────────────────────── #
working_paper_patterns:
  - working paper
  - nber
  - national bureau of economic research
  - ssrn
  - cepr
  - fed working paper
  - federal reserve
  - boe working paper
  - ecb working paper
  - bis working paper
  - discussion paper
  - research paper series

# ─────────────────────────────────────────────────────────────────────── #
# Venue scope — orthogonal to is_academic. Finer-grained project-relevance
# filter. Pure code derivation, no LLM.
#
# Defaults (when a venue is in academic or practitioner set but not listed
# here): academic -> finance_adjacent; practitioner -> finance_practitioner.
# Explicit entries below override the default.
#
# Scope values emitted by classify_venue_scope():
#   finance_core          — benchmark journals measuring "the academic frontier"
#                           this project is about. Most narrowly relevant.
#   finance_adjacent      — academic, finance-flavored, but outside the frontier
#                           (real estate finance, empirical finance not in
#                           benchmark, etc.). DEFAULT for academic set.
#   finance_practitioner  — practitioner finance (FAJ, AQR whites, etc.).
#                           DEFAULT for practitioner set.
#   non_finance_academic  — academic but outside finance entirely
#                           (psychology, general economics).
#   non_finance_other     — not academic, not finance practitioner
#                           (media, data vendors, annual reports).
#   None                  — unknown / defer.
# ─────────────────────────────────────────────────────────────────────── #
scopes:
  finance_core:
    # Benchmark journals (gap_structure.md §Academic Benchmark Journals)
    - journal of finance
    - journal of financial economics
    - review of financial studies
    - journal of financial and quantitative analysis
    - review of finance
    - journal of corporate finance
    - journal of financial intermediation
    - review of asset pricing studies
    - review of corporate finance studies
    - journal of banking and finance
    - journal of financial markets

  non_finance_academic:
    # Psychology (APA journals cited in behavioral finance)
    - journal of clinical psychology
    - journal of consulting and clinical psychology
    - journal of consulting psychology
    # General economics (not specifically finance)
    - journal of economic perspectives

  non_finance_other:
    # Financial press / media
    - bloomberg
    - wall street journal
    - new york times
    - fortune
    # Data / index providers
    - s and p dow jones indices
    - ftse russell
    # Annual reports / firm reference material
    - berkshire hathaway
    - berkshire hathaway inc annual report
    # Non-finance firm reports
    - credit foncier immobilier
    - crédit foncier immobilier
