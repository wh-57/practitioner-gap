# venues.yaml — journal classification for the is_academic cascade + venue_scope
# Schema: v2.2 | Phase 1 shadow
#
# Lives at: gap/src/post_processing/venues.yaml
# Consumed by: gap/src/01c_resolve.py  (classify_is_academic, classify_venue_scope)
#
# MATCHING POLICY (is_academic)
#   1. Normalize venue string: lowercase, & -> and, drop parentheticals, strip
#      volume/issue info, keep only alphanumerics and spaces, collapse
#      whitespace, strip leading "the".
#   2. Alias lookup: if normalized string is in `aliases`, replace with
#      the canonical full name.
#   3. Ambiguous set: if the normalized string (post-alias) is in
#      `ambiguous`, return None — defer to LLM.
#   4. Academic set: True.
#   5. Practitioner set: False.
#   6. Working-paper substring: return None — defer to author-network check
#      (Phase 1.5 once finance-author network is exported from 02_openalex.py).
#   7. Otherwise: None (unknown) — defer to LLM.
#
# MATCHING POLICY (venue_scope — orthogonal to is_academic)
#   1. Normalize and alias-resolve (same as above).
#   2. Explicit scope override: if the string matches any `scopes.{name}`
#      entry, return that scope name.
#   3. Default by academic/practitioner membership:
#        in `academic` set     -> "finance_adjacent"
#        in `practitioner` set -> "finance_practitioner"
#   4. Otherwise: None.
#
# DESIGN NOTE
#   None is the correct return for "not confidently classified by code."
#   Do NOT guess. The coalesce step in 01c_resolve.py uses the LLM value
#   whenever the is_academic code returns None, so over-eager pattern
#   matching only damages data quality. When in doubt, put the venue in
#   `ambiguous` or leave it out entirely.

# ─────────────────────────────────────────────────────────────────────── #
# Academic — is_academic = TRUE
# ─────────────────────────────────────────────────────────────────────── #
